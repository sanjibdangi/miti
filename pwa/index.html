<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Miti — Premium Nepali/English dual date calendar, converter, and planning tool. See today's BS & AD date instantly.">
  <meta name="theme-color" content="#DC143C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Miti">
  <title>Miti — मिति | Nepali Date Calendar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Mukta:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/widget.css">
  <link rel="stylesheet" href="styles/calendar.css">
  <link rel="stylesheet" href="styles/converter.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/pwa.css">
</head>
<body class="pwa-mode">

  <!-- PWA HEADER (replaces pill in mobile) -->
  <div id="pwa-header" class="pwa-header">
    <div class="pwa-header-top">
      <div class="pwa-brand">
        <span class="brand-icon">🇳🇵</span>
        <span class="brand-name">Miti</span>
        <span class="brand-name-np">मिति</span>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="theme-toggle" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>

    <!-- Today Card -->
    <div class="pwa-today-card" id="pwa-today-card">
      <div class="pwa-today-day" id="pwa-day-name"></div>
      <div class="pwa-today-dates">
        <div class="pwa-today-bs">
          <span class="pwa-date-label">BS</span>
          <span class="pwa-date-main" id="pwa-bs-date"></span>
          <span class="pwa-date-np" id="pwa-bs-date-np"></span>
        </div>
        <div class="pwa-today-divider"></div>
        <div class="pwa-today-ad">
          <span class="pwa-date-label">AD</span>
          <span class="pwa-date-main" id="pwa-ad-date"></span>
        </div>
      </div>
      <div class="pwa-today-holiday" id="pwa-holiday"></div>
      <button class="pwa-copy-btn" id="pwa-copy-btn">📋 Copy Today's Date</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs pwa-tabs">
    <button class="tab-btn active" data-tab="calendar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
    <button class="tab-btn" data-tab="converter">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      Convert
    </button>
    <button class="tab-btn" data-tab="holidays">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Holidays
    </button>
    <button class="tab-btn" data-tab="bookmarks">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      Saved
    </button>
  </div>

  <!-- Content Area -->
  <div class="expanded-content pwa-content" id="expanded-content">
    <!-- Dynamic content rendered here -->
  </div>

  <!-- Hidden elements that the Electron version uses (we override with PWA logic) -->
  <div id="pill" class="pill" style="display:none"></div>
  <div id="expanded" class="expanded visible" style="display:none"></div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/bs-data.js?v=2"></script>
  <script src="js/date-converter.js?v=2"></script>
  <script src="js/holidays.js?v=2"></script>
  <script src="js/utils.js?v=2"></script>
  <script src="js/bookmarks.js?v=2"></script>
  <script src="js/calendar.js?v=2"></script>
  <script src="js/app.js?v=2"></script>

  <!-- Unregister stale service worker from previous dev -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(r => r.unregister());
      });
    }
  </script>
</body>
</html>
