<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miti — मिति</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Mukta:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/widget.css">
  <link rel="stylesheet" href="styles/calendar.css">
  <link rel="stylesheet" href="styles/converter.css">
  <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
  <!-- COMPACT PILL VIEW -->
  <div id="pill" class="pill">
    <div class="pill-inner" id="pill-drag">
      <div class="pill-left">
        <div class="pill-flag">🇳🇵</div>
        <div class="pill-dates" id="pill-dates">
          <div class="pill-bs-date" id="pill-bs-date">Loading...</div>
          <div class="pill-bs-date-np" id="pill-bs-date-np"></div>
          <div class="pill-ad-date" id="pill-ad-date"></div>
        </div>
      </div>
      <div class="pill-right">
        <div class="pill-day" id="pill-day-name"></div>
        <div class="pill-holiday" id="pill-holiday"></div>
        <button class="pill-expand-btn" id="pill-expand" title="Expand calendar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- EXPANDED VIEW -->
  <div id="expanded" class="expanded">
    <div class="expanded-inner">
      <!-- Top Bar -->
      <div class="expanded-topbar">
        <div class="topbar-brand">
          <span class="brand-icon">🇳🇵</span>
          <span class="brand-name">Miti</span>
          <span class="brand-name-np">मिति</span>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="theme-toggle" title="Toggle theme">
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="topbar-btn" id="minimize-btn" title="Minimize to tray">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="topbar-btn" id="collapse-btn" title="Collapse to pill">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>

      <!-- Today Summary Bar -->
      <div class="today-bar">
        <div class="today-bs">
          <span class="today-label">BS</span>
          <span class="today-date" id="expanded-bs-date"></span>
        </div>
        <div class="today-divider">|</div>
        <div class="today-ad">
          <span class="today-label">AD</span>
          <span class="today-date" id="expanded-ad-date"></span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="calendar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </button>
        <button class="tab-btn" data-tab="converter">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Convert
        </button>
        <button class="tab-btn" data-tab="holidays">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Holidays
        </button>
        <button class="tab-btn" data-tab="bookmarks">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Saved
        </button>
      </div>

      <!-- Content Area -->
      <div class="expanded-content" id="expanded-content">
        <!-- Dynamic content rendered here -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/bs-data.js"></script>
  <script src="js/date-converter.js"></script>
  <script src="js/holidays.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
